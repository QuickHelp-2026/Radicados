<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cafam Biológicos – Radicados</title>
<style>
  :root {
    --verde: #0F6E56;
    --verde-light: #E1F5EE;
    --verde-mid: #1D9E75;
    --verde-dark: #085041;
    --rojo: #D85A30;
    --rojo-light: #FAECE7;
    --gris: #5F5E5A;
    --gris-light: #F1EFE8;
    --texto: #2C2C2A;
    --borde: rgba(0,0,0,0.10);
    --radio: 14px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: #f4f6f3;
    min-height: 100vh;
    color: var(--texto);
  }

  header {
    background: var(--verde-dark);
    color: #fff;
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-circle {
    width: 40px; height: 40px;
    background: var(--verde-mid);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 { font-size: 16px; font-weight: 600; line-height: 1.2; }
  header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  .card {
    background: #fff;
    border-radius: var(--radio);
    border: 1px solid var(--borde);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--verde);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gris);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="time"], select {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    outline: none;
    font-family: var(--font);
    color: var(--texto);
    background: #fff;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }

  input:focus, select:focus {
    border-color: var(--verde-mid);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.10);
  }

  .hora-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .hora-row input { margin-bottom: 0; flex: 1; }

  .btn-hora {
    padding: 14px 14px;
    background: var(--verde-light);
    border: 1.5px solid var(--verde-mid);
    border-radius: 10px;
    color: var(--verde-dark);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-hora:active { transform: scale(0.97); }

  .hora-display {
    font-size: 22px;
    font-weight: 700;
    color: var(--verde-dark);
    text-align: center;
    padding: 10px 0 4px;
    letter-spacing: 1px;
  }

  .fecha-display {
    font-size: 13px;
    color: var(--gris);
    text-align: center;
    margin-bottom: 14px;
  }

  .radicado-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .radicado-input-row input {
    flex: 1;
    margin-bottom: 0;
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  .btn-agregar {
    padding: 14px 16px;
    background: var(--verde-mid);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-agregar:active { transform: scale(0.95); background: var(--verde); }

  .badge-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--verde-mid);
    color: #fff;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    margin-left: auto;
  }

  .lista-radicados {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
    max-height: 260px;
    overflow-y: auto;
  }

  .radicado-item {
    display: flex;
    align-items: center;
    background: var(--gris-light);
    border-radius: 10px;
    padding: 10px 12px;
    gap: 10px;
  }

  .radicado-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--verde-mid);
    min-width: 18px;
    text-align: center;
  }

  .radicado-text {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--texto);
    font-family: monospace;
    letter-spacing: 0.5px;
  }

  .radicado-hora {
    font-size: 11px;
    color: var(--gris);
  }

  .btn-eliminar {
    background: none;
    border: none;
    color: #bbb;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .btn-eliminar:active { color: var(--rojo); }

  .empty-state {
    text-align: center;
    padding: 24px 0 8px;
    color: #bbb;
    font-size: 14px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  .btn-enviar {
    width: 100%;
    padding: 18px;
    background: var(--verde-dark);
    color: #fff;
    border: none;
    border-radius: var(--radio);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
    margin-top: 4px;
  }

  .btn-enviar:active { background: var(--verde); }
  .btn-enviar:disabled { background: #ccc; cursor: not-allowed; }

  .btn-enviar-sub {
    display: block;
    font-size: 12px;
    font-weight: 400;
    opacity: 0.75;
    margin-top: 3px;
  }

  .alerta {
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
  }

  .alerta.exito {
    background: var(--verde-light);
    color: var(--verde-dark);
    border: 1px solid rgba(15,110,86,0.2);
  }

  .alerta.error {
    background: var(--rojo-light);
    color: #7a2a12;
    border: 1px solid rgba(216,90,48,0.2);
  }

  .alerta.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -3px;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    font-size: 12px;
    color: var(--gris);
    text-align: center;
    margin-top: -8px;
    margin-bottom: 10px;
  }

  .mensajero-select-row { position: relative; }
  .mensajero-select-row::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--gris);
    font-size: 14px;
    margin-top: -7px;
  }

  select { appearance: none; padding-right: 36px; }

  .historial-toggle {
    background: none;
    border: 1px solid var(--borde);
    border-radius: 10px;
    padding: 10px 16px;
    width: 100%;
    font-size: 13px;
    color: var(--gris);
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-circle">🧬</div>
  <div>
    <h1>Cafam Biológicos</h1>
    <p>Registro de Radicados</p>
  </div>
</header>

<div class="main">

  <div id="alerta" class="alerta"></div>

  <!-- Tarjeta: Mensajero -->
  <div class="card">
    <div class="card-title">👤 Datos del mensajero</div>

    <label for="mensajero">Nombre del mensajero</label>
    <div class="mensajero-select-row">
      <select id="mensajero">
        <option value="">— Selecciona tu nombre —</option>
        <!-- Agrega aquí los nombres de tus mensajeros -->
        <option>Carlos Rodríguez</option>
        <option>Ana Martínez</option>
        <option>Luis García</option>
        <option>María López</option>
        <option>Juan Torres</option>
        <option>Otro</option>
      </select>
    </div>

    <label for="sede">Sede / Punto de entrega</label>
    <div class="mensajero-select-row">
      <select id="sede">
        <option value="">— Selecciona la sede —</option>
        <option>Laboratorio Central</option>
        <option>Sede Norte</option>
        <option>Sede Sur</option>
        <option>Sede Occidente</option>
        <option>Clínica Cafam</option>
      </select>
    </div>
  </div>

  <!-- Tarjeta: Hora -->
  <div class="card">
    <div class="card-title">🕐 Hora de entrega</div>
    <div class="hora-display" id="horaActual">--:--</div>
    <div class="fecha-display" id="fechaActual">cargando...</div>
    <div class="hora-row">
      <input type="time" id="horaEntrega" placeholder="HH:MM">
      <button class="btn-hora" onclick="usarHoraActual()">⏱ Ahora</button>
    </div>
    <p class="hint">Toca "Ahora" para registrar la hora automáticamente</p>
  </div>

  <!-- Tarjeta: Radicados -->
  <div class="card">
    <div class="card-title">
      📋 Radicados
      <span class="badge-count" id="contadorBadge">0</span>
    </div>

    <label for="inputRadicado">Escanear o digitar número de radicado</label>
    <div class="radicado-input-row">
      <input type="text" id="inputRadicado"
             placeholder="Ej: RAD-2024-00123"
             autocomplete="off"
             autocorrect="off"
             autocapitalize="characters"
             onkeydown="if(event.key==='Enter') agregarRadicado()">
      <button class="btn-agregar" onclick="agregarRadicado()">+</button>
    </div>
    <p class="hint">💡 Si usas lector de código de barras, automáticamente se agregará</p>

    <div id="listaRadicados" class="lista-radicados">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        Aún no hay radicados registrados
      </div>
    </div>
  </div>

  <!-- Botón enviar -->
  <button class="btn-enviar" id="btnEnviar" onclick="enviarDatos()">
    ✅ Enviar registros
    <span class="btn-enviar-sub">Se guardará en Google Sheets automáticamente</span>
  </button>

</div>

<script>
  // ─────────────────────────────────────────────
  // ⚙️ CONFIGURACIÓN — solo cambia esta URL
  // ─────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztL91xjDE9ThDB3PmLUmMWx_CB3R8MmfIpRUKg_FU3ekU3JeiQQlRV5PzAWOnAmI-h/exec';
  // ─────────────────────────────────────────────

  let radicados = [];

  function padZ(n) { return String(n).padStart(2,'0'); }

  function horaTexto(d) {
    return padZ(d.getHours()) + ':' + padZ(d.getMinutes());
  }

  function fechaTexto(d) {
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
  }

  function actualizarReloj() {
    const ahora = new Date();
    document.getElementById('horaActual').textContent = horaTexto(ahora);
    document.getElementById('fechaActual').textContent = fechaTexto(ahora);
  }

  function usarHoraActual() {
    const ahora = new Date();
    document.getElementById('horaEntrega').value = horaTexto(ahora);
    pulse('horaEntrega');
  }

  function pulse(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--verde-mid)';
    el.style.boxShadow = '0 0 0 3px rgba(29,158,117,0.18)';
    setTimeout(() => {
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }, 600);
  }

  function agregarRadicado() {
    const input = document.getElementById('inputRadicado');
    const val = input.value.trim().toUpperCase();
    if (!val) return;
    if (radicados.find(r => r.codigo === val)) {
      mostrarAlerta('⚠️ Este radicado ya fue agregado.', 'error');
      input.value = '';
      return;
    }
    const hora = document.getElementById('horaEntrega').value || horaTexto(new Date());
    radicados.push({ codigo: val, hora });
    input.value = '';
    input.focus();
    renderLista();
  }

  function eliminarRadicado(i) {
    radicados.splice(i, 1);
    renderLista();
  }

  function renderLista() {
    const contenedor = document.getElementById('listaRadicados');
    document.getElementById('contadorBadge').textContent = radicados.length;

    if (radicados.length === 0) {
      contenedor.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div>Aún no hay radicados registrados</div>';
      return;
    }

    contenedor.innerHTML = radicados.map((r, i) => `
      <div class="radicado-item">
        <span class="radicado-num">${i+1}</span>
        <span class="radicado-text">${r.codigo}</span>
        <span class="radicado-hora">⏱ ${r.hora}</span>
        <button class="btn-eliminar" onclick="eliminarRadicado(${i})" aria-label="Eliminar">✕</button>
      </div>
    `).join('');
  }

  function mostrarAlerta(msg, tipo) {
    const el = document.getElementById('alerta');
    el.textContent = msg;
    el.className = `alerta ${tipo} visible`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => el.classList.remove('visible'), 4000);
  }

  async function enviarDatos() {
    const mensajero = document.getElementById('mensajero').value;
    const sede = document.getElementById('sede').value;
    const hora = document.getElementById('horaEntrega').value;

    if (!mensajero) { mostrarAlerta('⚠️ Selecciona tu nombre.', 'error'); return; }
    if (!sede) { mostrarAlerta('⚠️ Selecciona la sede de entrega.', 'error'); return; }
    if (!hora) { mostrarAlerta('⚠️ Registra la hora de entrega.', 'error'); return; }
    if (radicados.length === 0) { mostrarAlerta('⚠️ Agrega al menos un radicado.', 'error'); return; }

    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    const ahora = new Date();
    const payload = {
      mensajero,
      sede,
      horaEntrega: hora,
      fecha: ahora.toLocaleDateString('es-CO'),
      timestamp: ahora.toISOString(),
      radicados
    };

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      mostrarAlerta(`✅ ¡Listo! ${radicados.length} radicado(s) enviado(s) correctamente.`, 'exito');
      radicados = [];
      renderLista();
      document.getElementById('mensajero').value = '';
      document.getElementById('sede').value = '';
      document.getElementById('horaEntrega').value = '';
    } catch(e) {
      mostrarAlerta('❌ Error al enviar. Verifica tu conexión e intenta de nuevo.', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = '✅ Enviar registros<span class="btn-enviar-sub">Se guardará en Google Sheets automáticamente</span>';
  }

  // Auto-add cuando llega código de barras (termina en Enter)
  document.getElementById('inputRadicado').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); agregarRadicado(); }
  });

  actualizarReloj();
  setInterval(actualizarReloj, 10000);
  usarHoraActual();
</script>
</body>
</html>
